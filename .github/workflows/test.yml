name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install Backend Dependencies
      run: |
        pip install -r backend/requirements.txt

    - name: Run Pytest
      run: |
        pytest backend/

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Run Vitest
      run: |
        cd frontend
        npx vitest run
